<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selective Translate Icon Export</title>
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #2563EB;
      }

      body {
        display: grid;
        place-items: stretch;
      }

      img {
        display: block;
        width: 100vw;
        height: 100vh;
        transform: translateY(14px) scale(0.92);
        transform-origin: center;
      }
    </style>
  </head>
  <body>
    <img src="./icon.svg" alt="极简翻译 icon">
  </body>
</html>
