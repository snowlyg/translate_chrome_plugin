<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极简翻译</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div class="hero-card">
          <div class="brand">
            <img class="brand-icon" src="assets/icon.svg" alt="极简翻译图标">
            <div class="brand-copy">
              <p id="heroEyebrow" class="eyebrow">Translate Plugin</p>
              <h1 id="heroTitle">网页划词翻译</h1>
            </div>
          </div>
          <div class="theme-row" aria-labelledby="labelThemeColor">
            <span id="labelThemeColor" class="theme-label">主题配色</span>
            <div class="theme-switcher" role="group" aria-label="主题配色">
              <button class="theme-swatch is-active" type="button" data-theme-color="#2563EB" style="--swatch-color:#2563EB;" aria-label="极简蓝" aria-pressed="true"></button>
              <button class="theme-swatch" type="button" data-theme-color="#1D4ED8" style="--swatch-color:#1D4ED8;" aria-label="深蓝" aria-pressed="false"></button>
              <button class="theme-swatch" type="button" data-theme-color="#0F766E" style="--swatch-color:#0F766E;" aria-label="青绿" aria-pressed="false"></button>
              <button class="theme-swatch" type="button" data-theme-color="#3B78E7" style="--swatch-color:#3B78E7;" aria-label="亮蓝" aria-pressed="false"></button>
              <button class="theme-swatch" type="button" data-theme-color="#178D61" style="--swatch-color:#178D61;" aria-label="深绿" aria-pressed="false"></button>
              <button class="theme-swatch" type="button" data-theme-color="#24292F" style="--swatch-color:#24292F;" aria-label="石墨" aria-pressed="false"></button>
            </div>
          </div>
          <div class="hero-status-row" aria-hidden="true">
            <span id="heroTabPrimary" class="hero-status-item">Translating</span>
            <span id="heroTabSecondary" class="hero-status-item">Grammar</span>
          </div>
          <div class="hero-meta-row" aria-hidden="true">
            <span id="heroChipMode" class="hero-meta-item">Inline first</span>
            <span id="heroChipGrammar" class="hero-meta-item">Grammar on</span>
          </div>
          <p id="heroSummary" class="summary">默认页内显示翻译与语法提示。</p>
        </div>
      </section>

      <label class="field">
        <span id="labelTargetLanguage">目标语言</span>
        <select id="targetLanguage">
          <option value="zh-CN">简体中文</option>
          <option value="en">English</option>
          <option value="ja">日本语</option>
          <option value="ko">한국어</option>
          <option value="fr">Français</option>
        </select>
      </label>

      <section class="mode-field" aria-labelledby="labelResultDisplayMode">
        <span id="labelResultDisplayMode">结果展示方式</span>
        <div class="mode-toggle" role="group" aria-label="结果展示方式">
          <button id="modeSplit" class="mode-option is-active" type="button" data-mode="split" aria-pressed="true">侧边模式</button>
          <button id="modeInline" class="mode-option" type="button" data-mode="inline" aria-pressed="false">页内模式</button>
        </div>
      </section>

      <label class="switch">
        <span id="labelTtsEnabled">启用 TTS 播报</span>
        <input id="ttsEnabled" type="checkbox">
      </label>

      <label class="switch">
        <span id="labelGrammarHints">启用语法提示</span>
        <input id="grammarHintsEnabled" type="checkbox">
      </label>

      <button id="blockCurrentSite" class="secondary" type="button" disabled>屏蔽当前网站</button>
      <button id="openOptions" class="primary">打开高级设置</button>
      <p id="status" class="status"></p>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>
