<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极简翻译</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div class="brand">
          <img class="brand-icon" src="assets/icons/icon-48.png" alt="极简翻译图标">
          <div class="brand-copy">
            <p class="eyebrow">极简翻译</p>
            <h1>网页划词翻译</h1>
          </div>
        </div>
        <p class="summary">选中单词或句子后，直接调用多个翻译源返回结果。</p>
      </section>

      <label class="switch">
        <span>启用划词翻译</span>
        <input id="enabled" type="checkbox">
      </label>

      <label class="field">
        <span>目标语言</span>
        <select id="targetLanguage">
          <option value="zh-CN">简体中文</option>
          <option value="en">English</option>
          <option value="ja">日本语</option>
          <option value="ko">한국어</option>
          <option value="fr">Français</option>
        </select>
      </label>

      <label class="switch">
        <span>启用 TTS 播报</span>
        <input id="ttsEnabled" type="checkbox">
      </label>

      <button id="openOptions" class="primary">打开高级设置</button>
      <p id="status" class="status"></p>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>
